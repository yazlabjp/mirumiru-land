<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>core/v1 スモークテスト</title>
<style>
  /* このページ自身の見た目はcoreのCSS(base/components/themes)を読み込まない。
     #stageを本番同様のposition:fixedフルスクリーンにすると診断結果が見えなくなるため、
     診断ページ専用の最小限のスタイルだけをここに書く。 */
  body { font-family: -apple-system, "Hiragino Sans", sans-serif; margin: 0; padding: 24px; background: #fafafa; color: #222; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  p.desc { color: #555; font-size: 14px; }
  #stage { position: relative; width: 320px; height: 240px; border: 1px solid #ccc; margin: 16px 0; overflow: hidden; background: #fff; }
  ul#results { list-style: none; padding: 0; margin: 16px 0; max-width: 640px; }
  li { padding: 6px 10px; border-bottom: 1px solid #eee; font-size: 14px; display: flex; gap: 8px; align-items: flex-start; }
  li.ok { color: #1a7f37; }
  li.ng { color: #c0392b; }
  .mark { font-weight: bold; width: 20px; flex: none; }
  button { font-size: 16px; padding: 12px 20px; margin-right: 8px; margin-bottom: 8px; }
  #summary { font-weight: bold; margin-top: 8px; font-size: 16px; }
  #summary.ok { color: #1a7f37; }
  #summary.ng { color: #c0392b; }
  .note { font-size: 12px; color: #888; }
</style>
</head>
<body>
  <h1>core/v1 スモークテスト</h1>
  <p class="desc">
    ページを開くと自動で診断が実行されます(design.md §8-8「(4) スモークテスト」)。<br>
    音のテストのみ、iOSの自動再生制限のためボタン操作が必要です。<br>
    <span class="note">このページ自体は本番のcore CSSを読み込みません(#stageをフルスクリーンにすると結果が見えなくなるため)。見た目の確認は各アプリ(例: apps/c01-target-touch/)で行ってください。</span>
  </p>

  <div id="stage"></div>

  <div>
    <button id="run-audio-test" type="button">🔊 音のテストを実行</button>
    <button id="rerun-all" type="button">🔁 自動診断を再実行</button>
  </div>

  <ul id="results"></ul>
  <div id="summary"></div>

  <script src="js/vt-core.js"></script>
  <script src="js/vt-input.js"></script>
  <script src="js/vt-storage.js"></script>
  <script src="js/vt-settings.js"></script>
  <script src="js/vt-feedback.js"></script>
  <script src="js/vt-stim.js"></script>
  <script src="js/vt-motion.js"></script>
  <script src="js/vt-chart.js"></script>
  <script src="js/vt-scene.js"></script>

  <script>
  (function () { 'use strict';

  var resultsEl = document.getElementById('results');
  var summaryEl = document.getElementById('summary');
  var passCount = 0, failCount = 0;

  function addResult(ok, name, detail) {
    var li = document.createElement('li');
    li.className = ok ? 'ok' : 'ng';
    var mark = document.createElement('span');
    mark.className = 'mark';
    mark.textContent = ok ? '○' : '✗';
    var text = document.createElement('span');
    text.textContent = name + (detail ? '(' + detail + ')' : '');
    li.appendChild(mark);
    li.appendChild(text);
    resultsEl.appendChild(li);
    if (ok) { passCount++; } else { failCount++; }
  }

  function assertTrue(cond, msg) {
    if (!cond) throw new Error(msg || 'assertTrue failed');
  }
  function assertEq(actual, expected, msg) {
    if (actual !== expected) {
      throw new Error((msg || 'assertEq') + ': expected=' + JSON.stringify(expected) + ' actual=' + JSON.stringify(actual));
    }
  }

  // ============================================================
  // 自動診断(音以外)
  // ============================================================
  var autoTests = [];
  function test(name, fn) { autoTests.push({ name: name, fn: fn }); }

  // ---- VT.Rand ----
  test('VT.Rand.int が範囲内の整数を返す', function () {
    for (var i = 0; i < 50; i++) {
      var v = VT.Rand.int(1, 3);
      assertTrue(v >= 1 && v <= 3 && Number.isInteger(v), 'int(1,3)=' + v);
    }
  });
  test('VT.Rand.pos が端24px以上・要素サイズ内に収まる位置を返す', function () {
    var size = 60;
    var rect = document.getElementById('stage').getBoundingClientRect();
    for (var i = 0; i < 30; i++) {
      var p = VT.Rand.pos({ size: size, area: 'full' });
      assertTrue(p.x >= 24 && p.x + size <= rect.width - 24, 'x=' + p.x);
      assertTrue(p.y >= 24 && p.y + size <= rect.height - 24, 'y=' + p.y);
    }
  });

  // ---- VT.Storage / RecordStore(vt-storage.js) ----
  test('VT.Storage.get/set/remove が正しく動く', function () {
    VT._app.setId('smoketest-app');
    VT.Storage.remove('probe');
    assertEq(VT.Storage.get('probe', 'fallback'), 'fallback', '未設定時はfallback');
    VT.Storage.set('probe', { n: 42 });
    assertEq(VT.Storage.get('probe', null).n, 42, '保存値の読み出し');
    VT.Storage.remove('probe');
    assertEq(VT.Storage.get('probe', 'gone'), 'gone', '削除後はfallback');
  });
  test('RecordStore: 記録追加・ベスト更新・直近10件トリム', function () {
    VT._recordStore.clearRecords('smoketest-app');
    for (var i = 1; i <= 12; i++) {
      VT._recordStore.appendRecord('smoketest-app', { value: i, date: '2026-07-22', digest: 'd', extras: {} }, 'higher');
    }
    var r = VT._recordStore.readRecords('smoketest-app');
    assertEq(r.recent.length, 10, 'recentは最大10件');
    assertEq(r.best.value, 12, 'bestはhigherで最大値');
    VT._recordStore.clearRecords('smoketest-app');
  });

  // ---- VT.Settings ----
  test('VT.Settings: スキーマ検証・共通設定付与・digest', function () {
    var schema = VT.Settings.buildFullSchema({
      size: { type: 'choice', label: '大きさ', default: 'l', options: [{ value: 'l', label: '大' }, { value: 's', label: '小' }] }
    });
    var validated = VT.Settings.validate(schema, { size: 'xxx' });
    assertEq(validated.size, 'l', '未知のchoice値はdefaultへ');
    assertEq(validated.sound, true, '共通設定soundが自動付与される');
    assertEq(VT.Settings.digest(schema, validated), 'l', 'digestはdifficulty:falseを除く');
  });
  test('VT.Settings: 設定コード(?s=)の往復', function () {
    var code = VT.Settings.buildCode('smoketest-app', { a: 1 });
    var decoded = VT.Settings.decodeCode(code);
    assertEq(decoded.id, 'smoketest-app', 'id往復');
    assertEq(decoded.set.a, 1, '値往復');
  });

  // ---- VT.Input(実DOM要素へ本物のPointerEventを発火) ----
  test('VT.Input.tap: pointerdown基準+同一要素300msデバウンス', function () {
    var el = document.createElement('div');
    document.getElementById('stage').appendChild(el);
    var count = 0;
    VT.Input.tap(el, function () { count++; }, { debounce: 300 });
    el.dispatchEvent(new PointerEvent('pointerdown', { clientX: 10, clientY: 10, pointerId: 1, bubbles: true }));
    el.dispatchEvent(new PointerEvent('pointerdown', { clientX: 10, clientY: 10, pointerId: 1, bubbles: true }));
    assertEq(count, 1, '連続タップはデバウンスされる(300ms以内)');
    el.remove();
  });

  // ---- VT.Stim ----
  test('VT.Stim.card がSVG要素を生成する', function () {
    var card = VT.Stim.card('animals', 'usagi', { size: 80 });
    assertEq(card.tagName.toLowerCase(), 'svg', 'svgタグ');
    assertEq(card.getAttribute('width'), '80', 'サイズ指定が反映される');
  });
  test('VT.Stim.shape が5種すべて生成できる', function () {
    ['circle', 'square', 'triangle', 'star', 'heart'].forEach(function (shape) {
      var el = VT.Stim.shape({ shape: shape, size: 40 });
      assertEq(el.tagName.toLowerCase(), 'svg', shape);
    });
  });

  // ---- VT.Motion(実際のrAFで位置が進むことを確認) ----
  test('VT.Motion.move が実際に位置を更新する(rAF)', function () {
    return new Promise(function (resolve, reject) {
      var el = document.createElement('div');
      el.style.position = 'absolute';
      document.getElementById('stage').appendChild(el);
      var ctrl = VT.Motion.move(el, { path: 'lineH', speed: 200, area: 'full' });
      var p0 = ctrl.pos();
      setTimeout(function () {
        try {
          var p1 = ctrl.pos();
          ctrl.stop();
          el.remove();
          assertTrue(p1.x !== p0.x, '約300ms後に位置が変化している');
          resolve();
        } catch (e) { reject(e); }
      }, 300);
    });
  });

  // ---- VT.Chart ----
  test('VT.Chart.render が記録数に応じたバーを描画する', function () {
    var el = VT.Chart.render(
      [{ value: 3 }, { value: 7 }, { value: 5 }],
      { key: 'hits', betterIs: 'higher' }
    );
    var bars = el.querySelectorAll('.vt-chart-bar');
    assertEq(bars.length, 3, 'バーの本数が記録数と一致する');
  });

  // ---- vt-scene.js: 公開APIの存在確認(実際のVT.createApp呼び出しはこのページを乗っ取るため行わない) ----
  test('VT.createApp / VT.Scene.dialog・goTitle・goCatalog が定義されている', function () {
    assertTrue(typeof VT.createApp === 'function', 'VT.createApp');
    assertTrue(typeof VT.Scene === 'object' && VT.Scene, 'VT.Scene');
    assertTrue(typeof VT.Scene.dialog === 'function', 'VT.Scene.dialog');
    assertTrue(typeof VT.Scene.goTitle === 'function', 'VT.Scene.goTitle');
    assertTrue(typeof VT.Scene.goCatalog === 'function', 'VT.Scene.goCatalog');
  });
  test('OrientationGuard: init()が例外なく動く(縦持ちなら別途タブで目視確認)', function () {
    VT._orientationGuard.init();
    assertTrue(typeof VT._orientationGuard.isPortrait() === 'boolean', 'isPortrait()が真偽値を返す');
  });

  async function runAutoTests() {
    resultsEl.innerHTML = '';
    passCount = 0; failCount = 0;
    for (var i = 0; i < autoTests.length; i++) {
      var t = autoTests[i];
      try {
        await t.fn();
        addResult(true, t.name);
      } catch (e) {
        addResult(false, t.name, e && e.message);
      }
    }
    showSummary();
  }

  function showSummary() {
    var total = passCount + failCount;
    summaryEl.className = failCount === 0 ? 'ok' : 'ng';
    summaryEl.textContent = failCount === 0
      ? '○ すべて成功 (' + passCount + '/' + total + ')'
      : '✗ ' + failCount + '件失敗 (' + passCount + '/' + total + ')';
  }

  document.getElementById('rerun-all').addEventListener('click', runAutoTests);

  // ============================================================
  // 音のテスト(ユーザー操作が必要。iOSの自動再生制限対策)
  // ============================================================
  document.getElementById('run-audio-test').addEventListener('click', function () {
    var name = 'VT.Feedback: AudioContext生成・再生・演出クラスの付与';
    try {
      VT.Feedback._notifyUserGesture(); // このクリック自体がユーザー操作
      VT.Feedback.play('tap');

      var el = document.createElement('div');
      document.getElementById('stage').appendChild(el);
      VT.Feedback.success(el, { style: 'bounce' });
      assertTrue(el.classList.contains('vt-fx-bounce'), '成功演出クラスが付与される');

      var el2 = document.createElement('div');
      document.getElementById('stage').appendChild(el2);
      VT.Feedback.soft(el2);
      assertTrue(el2.classList.contains('vt-fx-soft'), '不正解演出クラスが付与される(音は鳴らない)');

      setTimeout(function () { el.remove(); el2.remove(); }, 800);
      addResult(true, name, '再生されたか、実機のスピーカーで確認してください');
    } catch (e) {
      addResult(false, name, e && e.message);
    }
    showSummary();
  });

  runAutoTests();
  })();
  </script>
</body>
</html>
